name: Whoop sync every 30 minutes

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/whoop-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET not set"
            exit 0
          fi
          code=$(curl -s -o /tmp/out.txt -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://raam-2026.vercel.app/api/cron/whoop-sync)
          echo "HTTP $code"
          head -c 4000 /tmp/out.txt || true
          test "$code" = "200"
